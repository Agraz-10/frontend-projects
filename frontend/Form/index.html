<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
        <h1>User Information Form</h1>
        <form>

            <div class="name">
                <label>Name:</label><br>
                <input type="text" placeholder="Enter your name">
            </div>

            <br>

            <div class="age">
                <label>Age:</label><br>
                <input type="number" placeholder="Enter your age">
            </div>

            <br>

            <div class="position">
                <label>Which option describes you?</label><br>
                <select>
                    <option>Intern</option>
                    <option>Trainee</option>
                    <option>Employee</option>
                </select>
            </div>

            <br>

            <div class="recommend">
                <label>Would you recommend Sajilo Softwares to your friend?</label><br>
                <input type="radio" name="recommend"> Yes <br>
                <input type="radio" name="recommend"> No <br>
                <input type="radio" name="recommend"> Maybe <br>
            </div>

            <br>

            <div class="languages">
                <label>Languages or Frameworks you have used:</label><br>
                <input type="checkbox"> C <br>
                <input type="checkbox"> C++ <br>
                <input type="checkbox"> HTML <br>
                <input type="checkbox"> CSS <br>
                <input type="checkbox"> Python <br>
                <input type="checkbox"> Ruby <br>
                <input type="checkbox"> Rust <br>
                <input type="checkbox"> Javascript <br>
                <input type="checkbox"> React.js <br>
                <input type="checkbox"> Node.js <br>
                <input type="checkbox"> Laravel
            </div>

            <br>

            <div class="comment">
                <label>Any comments or suggestion:</label><br>
                <textarea placeholder="Enter your comments here..."></textarea>
            </div>

            <br>

            <div class="submit">
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
