<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram-Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile">
        <div class="profile-info">
            <h2>agraz_10</h2>

            <p>
                <bold>4</bold> posts
                <bold>219</bold> followers
                <bold>180</bold> following
            </p>

            <p>अग्रज अधिकारी</p>

            <p>
                उड्ने पुच्छरहरु भ्रममा विश्वास गर्छन्।<br>
                बोल्ने मानिसहरु कारण र प्रमाणमा विश्वास गर्छन्।
            </p>
        </div>
    </div>

    <div class="buttons">
        <button>Edit Profile</button>
        <button>View Archive</button>
    </div>

    <hr>

    <div class="posts">
        <img src="img/post 1.png" alt="Post 1">
        <img src="img/post 2.png" alt="Post 2">
        <img src="img/post 3.png" alt="Post 3">
        <img src="img/post 4.png" alt="Post 4">
    </div>
</body>
</html>
